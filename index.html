<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Notes</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Quill.js for Rich Text Editing -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="app">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="icon-btn theme-toggle" title="Toggle Theme">
            <i class="ph ph-moon"></i>
        </button>

        <!-- PIN Auth Screen -->
        <div id="auth-view" class="view-container active">
            <div class="auth-card glass-panel">
                <div class="auth-header">
                    <div class="auth-icon"><i class="ph ph-lock-key"></i></div>
                    <h1 id="auth-title">Welcome</h1>
                    <p id="auth-subtitle">Please enter your PIN</p>
                </div>

                <div class="pin-display">
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                    <div class="pin-dot"></div>
                </div>

                <p id="auth-error" class="error-msg hidden">Invalid PIN, please try again</p>

                <div class="numpad">
                    <button class="num-btn" data-val="1">1</button>
                    <button class="num-btn" data-val="2">2</button>
                    <button class="num-btn" data-val="3">3</button>
                    <button class="num-btn" data-val="4">4</button>
                    <button class="num-btn" data-val="5">5</button>
                    <button class="num-btn" data-val="6">6</button>
                    <button class="num-btn" data-val="7">7</button>
                    <button class="num-btn" data-val="8">8</button>
                    <button class="num-btn" data-val="9">9</button>
                    <button class="num-btn action-btn text-action" id="pin-clear">CLEAR</button>
                    <button class="num-btn" data-val="0">0</button>
                    <button class="num-btn action-btn" id="pin-backspace"><i class="ph ph-backspace"></i></button>
                </div>
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard-view" class="view-container hidden">
            <div class="dashboard-header">
                <h2>Previous Chats</h2>
            </div>
            <div class="dashboard-actions">
                <button id="settings-btn" class="icon-btn text-btn" title="Settings">
                    <i class="ph ph-gear"></i> Settings
                </button>
                <button id="new-note-btn" class="primary-btn">
                    <i class="ph ph-plus"></i> New Chat
                </button>
            </div>

            <div class="notes-controls">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search notes...">
                </div>
            </div>

            <div id="notes-grid" class="notes-grid">
                <!-- Notes will be injected here via JS -->
            </div>
        </div>

        <!-- Editor Screen -->
        <div id="editor-view" class="view-container hidden">
            <div class="editor-layout">
                <!-- Sidebar -->
                <aside class="editor-sidebar glass-panel">
                    <div class="sidebar-header">
                        <button id="back-to-dash" class="icon-btn text-btn">
                            <i class="ph ph-arrow-left"></i> Dashboard
                        </button>
                    </div>
                    <h3 class="sidebar-title">Previous Chats</h3>
                    <div id="sidebar-notes-list" class="sidebar-notes-list">
                        <!-- Sidebar notes injected here -->
                    </div>
                </aside>

                <!-- Main Editor Area -->
                <main class="editor-main">
                    <div class="editor-topbar glass-panel">
                        <input type="text" id="note-title-input" class="note-title-input"
                            placeholder="Untitled Document">
                        <div class="editor-actions">
                            <span id="save-status" class="save-status">Saved</span>

                            <button id="save-btn" class="icon-btn primary-icon-btn" title="Save (Ctrl+S)">
                                <i class="ph ph-floppy-disk"></i>
                            </button>
                            <button id="save-as-btn" class="icon-btn" title="Save As Custom Name">
                                <i class="ph ph-textbox"></i>
                            </button>
                            <div class="dropdown">
                                <button class="icon-btn" title="Export">
                                    <i class="ph ph-export"></i>
                                </button>
                                <div class="dropdown-content">
                                    <a href="#" id="export-txt">As .txt</a>
                                    <a href="#" id="export-html">As .html</a>
                                </div>
                            </div>
                            <div class="dropdown">
                                <button class="icon-btn" title="AI Magic Tools" style="color: var(--primary-color);">
                                    <i class="ph ph-magic-wand"></i>
                                </button>
                                <div class="dropdown-content">
                                    <a href="#" id="ai-summarize">Summarize</a>
                                    <a href="#" id="ai-grammar">Fix Grammar</a>
                                    <a href="#" id="ai-expand">Expand Concept</a>
                                </div>
                            </div>
                            <button id="print-btn" class="icon-btn" title="Print">
                                <i class="ph ph-printer"></i>
                            </button>
                            <button id="delete-btn" class="icon-btn danger-icon-btn" title="Delete Note">
                                <i class="ph ph-trash"></i>
                            </button>
                        </div>
                    </div>

                    <div class="editor-wrapper glass-panel">
                        <div id="editor-container"></div>
                    </div>

                    <div class="editor-footer">
                        <div class="stats">
                            <span id="word-count">0 words</span>
                            <span class="dot-separator">•</span>
                            <span id="char-count">0 characters</span>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- Settings Modal (Overlay) -->
        <div id="settings-modal" class="modal-overlay hidden">
            <div class="settings-card glass-panel">
                <div class="settings-header">
                    <h2>Configuration</h2>
                    <button id="close-settings" class="icon-btn"><i class="ph ph-x"></i></button>
                </div>
                <div class="settings-body">
                    <div class="settings-group">
                        <label for="gemini-key">Gemini AI API Key</label>
                        <input type="password" id="gemini-key" placeholder="AI Studio Key (Optional)">
                    </div>
                    <div class="settings-group">
                        <label for="supabase-url">Supabase URL</label>
                        <input type="text" id="supabase-url" placeholder="https://your-project.supabase.co">
                    </div>
                    <div class="settings-group">
                        <label for="supabase-key">Supabase Anon Key</label>
                        <input type="password" id="supabase-key" placeholder="sb_publishable_...">
                    </div>
                    <button id="save-settings-btn" class="primary-btn w-full mt-4">Save & Reload</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script src="storage.js"></script>
    <script src="ai.js"></script>
    <script src="auth.js"></script>
    <script src="spellcheck.js"></script>
    <script src="editor.js"></script>
</body>

</html>
